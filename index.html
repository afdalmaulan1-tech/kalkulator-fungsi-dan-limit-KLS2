<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kalkulator Fungsi Lengkap</title>

<script src="https://cdn.jsdelivr.net/npm/mathjs@11/lib/browser/math.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #eef2f7;
    color: #1e293b;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    font-weight: 600;
    color: #0f172a;
    margin-bottom: 5px;
}

/* 🔥 Tambahan teks kelompok */
.subjudul {
    text-align: center;
    font-size: 14px;
    color: #64748b;
    margin-bottom: 20px;
}

.container {
    background: #ffffff;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    border: 1px solid #e2e8f0;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

h2 {
    margin-top: 0;
    color: #1e293b;
}

input, select {
    padding: 8px;
    margin: 5px;
    border-radius: 6px;
    border: 1px solid #cbd5e1;
    font-size: 14px;
}

input:focus, select:focus {
    outline: none;
    border-color: #2563eb;
}

button {
    background: #1e3a8a;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

canvas {
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    margin-top: 10px;
}

.rumus {
    font-weight: 500;
    margin-top: 5px;
}

.hasil-box {
    margin-top: 10px;
    padding: 12px;
    border-radius: 8px;
    background: #f1f5f9;
    border-left: 4px solid #1e3a8a;
}
</style>

</head>

<body>

<h1>Kalkulator Fungsi, Limit & Laju</h1>
<p class="subjudul">Kelompok 2 – Kalkulus</p>

<div class="container">
<h2>1. Fungsi</h2>

<select id="jenisFungsi" onchange="updateInput()">
<option value="manual">Manual</option>
<option value="linear">Linear</option>
<option value="kuadrat">Kuadrat</option>
<option value="eksponensial">Eksponensial</option>
</select>

<div id="manual">
<input id="fungsi" placeholder="Contoh: x^2 - 4*x + 3" oninput="tampilkanRumus()">
</div>

<div id="linear" style="display:none;">
a <input id="a1" oninput="tampilkanRumus()">
b <input id="b1" oninput="tampilkanRumus()">
</div>

<div id="kuadrat" style="display:none;">
a <input id="a2" oninput="tampilkanRumus()">
b <input id="b2" oninput="tampilkanRumus()">
c <input id="c2" oninput="tampilkanRumus()">
</div>

<div id="eksponensial" style="display:none;">
a <input id="a3" oninput="tampilkanRumus()">
</div>

<p id="rumusFungsi" class="rumus"></p>

<button onclick="gambarFungsi()">Tampilkan Grafik</button>

<h3>Hitung Nilai f(x)</h3>
<input id="nilaiX" placeholder="Masukkan nilai x">
<button onclick="hitungNilai()">Hitung</button>
<p id="hasilFx"></p>

<canvas id="grafik"></canvas>
</div>

<div class="container">
<h2>2. Laju Perubahan</h2>

x1 <input id="x1">
x2 <input id="x2">

<button onclick="hitungLaju()">Hitung</button>
<p id="hasilLaju"></p>
</div>

<div class="container">
<h2>3. Limit</h2>

<input id="fungsiLimit" placeholder="Contoh: (x^2 -1)/(x-1)">
<input id="nilaiLimit" placeholder="x menuju">

<button onclick="hitungLimit()">Analisis Limit</button>

<div id="hasilLimit" class="hasil-box"></div>

<canvas id="grafikLimit"></canvas>
</div>

<script>
let chart, chartLimit;

function updateInput(){
["manual","linear","kuadrat","eksponensial"].forEach(id=>{
document.getElementById(id).style.display="none";
});
let jenis=document.getElementById("jenisFungsi").value;
document.getElementById(jenis).style.display="block";
tampilkanRumus();
}

function tampilkanRumus(){
let jenis=document.getElementById("jenisFungsi").value;
let teks="";

if(jenis==="linear"){
let a=a1.value||"a";
let b=b1.value||"b";
teks=`f(x) = ${a}x + ${b}`;
}
else if(jenis==="kuadrat"){
let a=a2.value||"a";
let b=b2.value||"b";
let c=c2.value||"c";
teks=`f(x) = ${a}x² + ${b}x + ${c}`;
}
else if(jenis==="eksponensial"){
let a=a3.value||"a";
teks=`f(x) = ${a}^x`;
}
else{
teks=fungsi.value;
}

rumusFungsi.innerText=teks;
}

function getFungsi(){
let jenis=document.getElementById("jenisFungsi").value;
if(jenis=="manual") return fungsi.value;
if(jenis=="linear") return `${a1.value}*x+${b1.value}`;
if(jenis=="kuadrat") return `${a2.value}*x^2+${b2.value}*x+${c2.value}`;
if(jenis=="eksponensial") return `${a3.value}^x`;
}

function gambarFungsi(){
let expr = getFungsi();
let x=[], y=[];

for(let i=-10;i<=10;i++){
    x.push(i);
    try{ 
        let val = math.evaluate(expr,{x:i});
        y.push(Math.round(val));
    }
    catch{ y.push(null); }
}

if(chart) chart.destroy();

chart = new Chart(grafik,{
type:'line',
data:{
labels:x,
datasets:[{
label:"Fungsi",
data:y,
borderColor:"#1e3a8a",
fill:false,
tension:0.2
}]
},
options:{
scales:{
y:{
ticks:{
callback: function(value){
return Math.round(value);
}
}
}
}
}
});
}

function hitungNilai(){
let expr=getFungsi();
let x=parseFloat(nilaiX.value);

let hasil;
try{ hasil=math.evaluate(expr,{x:x}); }
catch{ hasil="Error"; }

hasilFx.innerText="f("+x+") = "+Math.round(hasil);
}

function hitungLaju(){
let expr=getFungsi();
let x1=parseFloat(document.getElementById("x1").value);
let x2=parseFloat(document.getElementById("x2").value);

let f1=math.evaluate(expr,{x:x1});
let f2=math.evaluate(expr,{x:x2});

let hasil=(f2-f1)/(x2-x1);

hasilLaju.innerText="Laju Perubahan = "+Math.round(hasil);
}

function hitungLimit(){
let expr=fungsiLimit.value;
let a=parseFloat(nilaiLimit.value);

let kiri, kanan;

try{
kiri=math.evaluate(expr,{x:a-0.0001});
kanan=math.evaluate(expr,{x:a+0.0001});
}catch{
hasilLimit.innerText="Error";
return;
}

let hasil="", sistem="", warna="";

if(!isFinite(kiri)||!isFinite(kanan)){
hasil="∞";
sistem="Sistem tidak stabil";
warna="#fee2e2";
}
else if(Math.abs(kiri-kanan)<0.01){
hasil=Math.round((kiri+kanan)/2);
sistem="Sistem stabil";
warna="#dcfce7";
}
else{
hasil="Tidak ada";
sistem="Diskontinu (loncat)";
warna="#fef9c3";
}

hasilLimit.style.background=warna;

hasilLimit.innerHTML=`
Limit kiri ≈ ${Math.round(kiri)} <br>
Limit kanan ≈ ${Math.round(kanan)} <br><br>
<b>Hasil:</b> ${hasil} <br>
<b>Analisis:</b> ${sistem}
`;

let x=[],y=[];
for(let i=-10;i<=10;i++){
x.push(i);
try{ 
    let val = math.evaluate(expr,{x:i});
    y.push(Math.round(val));
}
catch{ y.push(null); }
}

if(chartLimit) chartLimit.destroy();

chartLimit=new Chart(grafikLimit,{
type:'line',
data:{
labels:x,
datasets:[{
label:"Limit",
data:y,
borderColor:"#b91c1c",
fill:false,
tension:0.2
}]
},
options:{
scales:{
y:{
ticks:{
callback: function(value){
return Math.round(value);
}
}
}
}
}
});
}
</script>

</body>
</html>
